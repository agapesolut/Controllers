version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: faturamento-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: faturamento_db
      POSTGRES_USER: faturamento_user
      POSTGRES_PASSWORD: faturamento_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: faturamento-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: agapesolut@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
